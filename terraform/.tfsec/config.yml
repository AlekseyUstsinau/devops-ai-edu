---
# tfsec configuration for demo environment
# Excludes security checks that are acceptable for development/demo scenarios

exclude:
  # Security Groups - Public internet access acceptable for demo web app
  - aws-ec2-no-public-ingress-sgr     # ALB needs public ingress
  - aws-ec2-no-public-egress-sgr      # ALB and ECS need public egress
  - aws-ec2-no-public-ip-subnet       # Public subnets need public IPs
  - aws-ec2-add-description-to-security-group  # Default descriptions OK for demo
  
  # Load Balancer - Basic config acceptable for demo
  - aws-elb-drop-invalid-headers      # Not critical for demo environment
  - aws-elb-http-not-used             # HTTP acceptable for demo (no SSL cert)
  - aws-elb-alb-not-public           # Public ALB required for demo web app
  
  # ECR - Relaxed security for demo
  - aws-ecr-enforce-immutable-repository  # Mutable tags OK for demo
  - aws-ecr-enable-image-scans           # Image scanning not required for demo
  - aws-ecr-repository-customer-key      # AWS managed keys OK for demo
  
  # VPC/Networking - Basic monitoring acceptable for demo
  - aws-ec2-require-vpc-flow-logs-for-all-vpcs  # Flow logs not required for demo
  
  # CloudWatch - AWS managed encryption acceptable for demo
  - aws-cloudwatch-log-group-customer-key       # AWS managed keys OK for demo
  
  # IAM - Broader permissions acceptable for demo roles
  - aws-iam-no-policy-wildcards        # Wildcards acceptable for demo ECR access

severity_overrides:
  HIGH: MEDIUM
  CRITICAL: HIGH