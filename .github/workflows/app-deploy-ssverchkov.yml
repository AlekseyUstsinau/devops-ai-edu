name: 'App Build & Deploy Pipeline - SSverchkov Personal'

on:
  workflow_dispatch:
    inputs:
      deployment_action:
        description: 'Deployment Action to Execute'
        required: true
        default: 'deploy'
        type: choice
        options:
          - build_only
          - deploy
          - destroy
  push:
    branches:
      - ssverchkov-demo1  # Only your branch
    paths:
      - 'app/**'
      - 'terraform/ecs-*app*'
      - 'terraform/ecs-task-definition-app.tf'
      - 'terraform/ecs-service-app.tf'
      - 'terraform/ecs-autoscaling-app.tf'
      - 'terraform/locals-app.tf'
  pull_request:
    branches:
      - ssverchkov-demo1  # Only your branch
    paths:
      - 'app/**'
      - 'terraform/ecs-*app*'
      - 'terraform/ecs-task-definition-app.tf'
      - 'terraform/ecs-service-app.tf'
      - 'terraform/ecs-autoscaling-app.tf'
      - 'terraform/locals-app.tf'

env:
  TF_VERSION: '1.5.7'
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  ECR_REPOSITORY: 'corporate-website-demo'
  AWS_DEFAULT_REGION: 'us-east-1'

jobs:
  dockerfile-lint:
    name: 'Dockerfile Lint'
    runs-on: ubuntu-latest

    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Lint Dockerfile'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile
          failure-threshold: error
          format: tty

  build_and_push:
    name: 'Build & Push Docker Image'
    runs-on: ubuntu-latest
    needs: [dockerfile-lint]
    outputs:
      image-tag: ${{ steps.build-info.outputs.image-tag }}
      image-uri: ${{ steps.build-info.outputs.image-uri }}
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: 'Login to Amazon ECR'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 'Generate Build Info'
        id: build-info
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}-$(date +%Y%m%d-%H%M%S)"
          REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          
          echo "image-tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: 'Build Docker Image'
        run: |
          echo "Building Docker image..."
          docker build \
            --tag ${{ env.ECR_REPOSITORY }}:${{ steps.build-info.outputs.image-tag }} \
            --tag ${{ env.ECR_REPOSITORY }}:latest \
            --tag ${{ steps.build-info.outputs.image-uri }} \
            --tag ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest \
            --file app/Dockerfile \
            .

      - name: 'Test Docker Image'
        run: |
          echo "Testing Docker image..."
          # Run basic container test
          docker run --rm -d --name test-container -p 8080:80 ${{ env.ECR_REPOSITORY }}:latest
          sleep 10
          
          # Test health endpoint
          curl -f http://localhost:8080/health || exit 1
          
          # Test main page
          curl -f http://localhost:8080/ || exit 1
          
          # Cleanup
          docker stop test-container
          echo "✅ Container tests passed"

      - name: 'Push to ECR'
        run: |
          echo "Pushing image with tags:"
          echo "  - ${{ steps.build-info.outputs.image-uri }}"
          echo "  - ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest"
          
          docker push ${{ steps.build-info.outputs.image-uri }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: 'Image Security Scan'
        run: |
          echo "Running security scan on image..."
          # Install trivy for vulnerability scanning
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy
          
          # Scan the image
          trivy image --exit-code 0 --severity LOW,MEDIUM ${{ env.ECR_REPOSITORY }}:latest
          trivy image --exit-code 1 --severity HIGH,CRITICAL ${{ env.ECR_REPOSITORY }}:latest
        continue-on-error: true

  terraform_plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: [build_and_push]
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: terraform
    outputs:
      plan-output: ${{ steps.plan.outputs.stdout }}
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: 'Cache Terraform'
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            **/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: 'Terraform Init'
        run: |
          terraform init -upgrade
          
      - name: 'Update Image Tag Variable'
        run: |
          # Update terraform.tfvars with new image tag
          if [ -f terraform.tfvars ]; then
            sed -i 's/corp_site_image_tag = .*/corp_site_image_tag = "${{ needs.build_and_push.outputs.image-tag }}"/' terraform.tfvars
          else
            echo 'corp_site_image_tag = "${{ needs.build_and_push.outputs.image-tag }}"' > terraform.tfvars
          fi
          echo "Updated terraform.tfvars:"
          cat terraform.tfvars

      - name: 'Terraform Plan'
        id: plan
        run: |
          terraform plan -detailed-exitcode -out=tfplan
          terraform show -no-color tfplan > plan-output.txt
        continue-on-error: true

      - name: 'Upload Plan Artifact'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            terraform/tfplan
            terraform/plan-output.txt
          retention-days: 5

      - name: 'Comment PR with Plan'
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan-output.txt', 'utf8');
            const truncatedOutput = planOutput.length > 60000 ? 
              planOutput.substring(0, 60000) + '\n... (truncated)' : planOutput;
            
            const output = `#### 🏗️ Terraform Plan for Corporate Site App
            **Image Tag:** \`${{ needs.build_and_push.outputs.image-tag }}\`
            **Image URI:** \`${{ needs.build_and_push.outputs.image-uri }}\`
            
            <details><summary>Show Plan</summary>
            
            \`\`\`hcl
            ${truncatedOutput}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  terraform_apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: [build_and_push, terraform_plan]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_action == 'deploy') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/ssverchkov-demo1')
    environment: 
      name: 'corporate-site-demo'
      url: http://corporate-website-demo-alb-65149525.us-east-1.elb.amazonaws.com
    defaults:
      run:
        working-directory: terraform
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: 'Cache Terraform'
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            **/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: 'Download Plan Artifact'
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: terraform/

      - name: 'Terraform Init'
        run: terraform init

      - name: 'Update Image Tag Variable'
        run: |
          # Update terraform.tfvars with new image tag
          if [ -f terraform.tfvars ]; then
            sed -i 's/corp_site_image_tag = .*/corp_site_image_tag = "${{ needs.build_and_push.outputs.image-tag }}"/' terraform.tfvars
          else
            echo 'corp_site_image_tag = "${{ needs.build_and_push.outputs.image-tag }}"' > terraform.tfvars
          fi

      - name: 'Terraform Apply'
        run: |
          terraform apply tfplan

      - name: 'Post-Deployment Health Check'
        run: |
          echo "⏳ Waiting for deployment to stabilize..."
          sleep 60
          
          # Get ALB DNS name from outputs
          ALB_DNS=$(terraform output -raw alb_dns_name)
          
          echo "🔍 Testing deployment at http://${ALB_DNS}"
          
          # Health check with retry
          for i in {1..10}; do
            if curl -f "http://${ALB_DNS}/health" > /dev/null 2>&1; then
              echo "✅ Health check passed on attempt $i"
              break
            else
              echo "❌ Health check failed on attempt $i, retrying in 30s..."
              sleep 30
            fi
            
            if [ $i -eq 10 ]; then
              echo "💥 Health check failed after 10 attempts"
              exit 1
            fi
          done
          
          # Test main page
          if curl -f "http://${ALB_DNS}/" > /dev/null 2>&1; then
            echo "✅ Main page accessible"
          else
            echo "❌ Main page not accessible"
            exit 1
          fi
          
          echo "🎉 Deployment successful!"
          echo "🌐 Application URL: http://${ALB_DNS}"

      - name: 'Deployment Summary'
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** \`${{ needs.build_and_push.outputs.image-tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image URI:** \`${{ needs.build_and_push.outputs.image-uri }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** corporate-site-demo" >> $GITHUB_STEP_SUMMARY
          echo "**ALB URL:** http://$(terraform output -raw alb_dns_name)" >> $GITHUB_STEP_SUMMARY
          echo "**Deployment Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

  terraform_destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_action == 'destroy'
    environment: 
      name: 'corporate-site-demo-destroy'
    defaults:
      run:
        working-directory: terraform
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: 'Terraform Init'
        run: terraform init

      - name: 'Terraform Destroy'
        run: terraform destroy -auto-approve