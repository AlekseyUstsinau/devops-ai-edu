name: 'Terraform Validation Pipeline - SSverchkov Personal'

on:
  workflow_dispatch:
  push:
    branches:
      - ssverchkov-demo1  # Only your branch
    paths:
      - 'terraform/**'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

env:
  TF_VERSION: '1.5.7'
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  terraform-validation:
    name: 'Terraform Validation & Security'
    runs-on: ubuntu-latest
    
    steps:
      - name: 'Pipeline Information'
        run: |
          echo "=== Terraform Validation Pipeline ==="
          echo "Purpose: Format check, security validation, and terraform plan"
          echo "Note: This pipeline does NOT apply changes to infrastructure"
          echo "Infrastructure deployments are handled by the application pipeline"
          echo "================================================"

      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 'Terraform Format Check'
        run: terraform fmt -check -recursive
        working-directory: terraform
        continue-on-error: false

      - name: 'Terraform Init'
        run: terraform init
        working-directory: terraform

      - name: 'Terraform Validate'
        run: terraform validate
        working-directory: terraform

      - name: 'Setup tfsec'
        run: |
          echo "Downloading tfsec..."
          wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.1/tfsec-linux-amd64
          chmod +x tfsec-linux-amd64
          sudo mv tfsec-linux-amd64 /usr/local/bin/tfsec
          echo "tfsec installed, checking version:"
          tfsec --version

      - name: 'Run tfsec Security Scan'
        run: |
          echo "Starting tfsec security scan..."
          tfsec . > tfsec-summary.txt || echo "tfsec scan completed with findings"
          echo "Security scan completed. Files created:"
          ls -la tfsec-*.* || echo "No tfsec files found"
        working-directory: terraform
        continue-on-error: true

      - name: 'Display Security Summary'
        run: |
          echo "=== Checking for tfsec results ==="
          pwd
          ls -la
          if [ -f tfsec-summary.txt ]; then
            echo "=== Security Scan Summary ==="
            cat tfsec-summary.txt
          else
            echo "No tfsec-summary.txt file found"
          fi
        working-directory: terraform
        continue-on-error: true

      - name: 'Upload Security Scan Results'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfsec-security-results
          path: terraform/tfsec-summary.txt
          retention-days: 30

  terraform-plan:
    name: 'Terraform Plan & Validate Changes'
    runs-on: ubuntu-latest
    needs: terraform-validation
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 'Terraform Init'
        run: terraform init
        working-directory: terraform

      - name: 'Terraform Plan (Validation Only)'
        run: |
          echo "=== Running Terraform Plan for Validation ==="
          echo "Note: This pipeline only validates infrastructure changes."
          echo "Actual deployments are handled by the application pipeline."
          terraform plan -detailed-exitcode -out=tfplan
        working-directory: terraform
        continue-on-error: true

      - name: 'Upload Plan Results'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: terraform-plan-results
          path: terraform/tfplan
          retention-days: 30