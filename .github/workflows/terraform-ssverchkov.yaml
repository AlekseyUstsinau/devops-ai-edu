name: 'Terraform Pipeline - SSverchkov Personal'

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform Action to Execute'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
  push:
    branches:
      - ssverchkov-demo1  # Only your branch
    paths:
      - 'terraform/**'

env:
  TF_VERSION: '1.5.7'
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  terraform-validation:
    name: 'Terraform Validation & Security'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 'Terraform Format Check'
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: 'Terraform Init'
        run: terraform init

      - name: 'Terraform Validate'
        run: terraform validate

      - name: 'Setup tfsec'
        run: |
          echo "Downloading tfsec..."
          wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.28.1/tfsec-linux-amd64
          chmod +x tfsec-linux-amd64
          sudo mv tfsec-linux-amd64 /usr/local/bin/tfsec
          echo "tfsec installed, checking version:"
          tfsec --version

      - name: 'Run tfsec Security Scan'
        run: |
          echo "Starting tfsec security scan..."
          tfsec . --format json --out tfsec-results.json || echo "tfsec JSON scan completed with findings"
          tfsec . --format table --out tfsec-summary.txt || echo "tfsec table scan completed with findings"
          echo "Security scan completed. Files created:"
          ls -la tfsec-*.* || echo "No tfsec files found"
        continue-on-error: true

      - name: 'Display Security Summary'
        run: |
          echo "=== Checking for tfsec results ==="
          pwd
          ls -la
          if [ -f tfsec-summary.txt ]; then
            echo "=== Security Scan Summary ==="
            cat tfsec-summary.txt
          else
            echo "No tfsec-summary.txt file found"
          fi
          if [ -f tfsec-results.json ]; then
            echo "=== JSON Results Size ==="
            wc -l tfsec-results.json
          else
            echo "No tfsec-results.json file found"
          fi
        continue-on-error: true

      - name: 'Upload Security Scan Results'
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfsec-security-results
          path: |
            tfsec-results.json
            tfsec-summary.txt
          retention-days: 30

  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: terraform-validation
    defaults:
      run:
        working-directory: terraform
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 'Terraform Init'
        run: terraform init

      - name: 'Terraform Plan'
        run: terraform plan -detailed-exitcode
        continue-on-error: true

  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: [terraform-validation, terraform-plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.terraform_action == 'apply'
    defaults:
      run:
        working-directory: terraform
    
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4

      - name: 'Setup Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SSVERCHKOV_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SSVERCHKOV_AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 'Terraform Init'
        run: terraform init

      - name: 'Terraform Apply'
        run: terraform apply -auto-approve